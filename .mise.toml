[tools]
node   = "24"
python = "3.12"

# Makes node_modules/.bin available without a global install
[env]
_.path = ["{{cwd}}/node_modules/.bin"]

# ── Tasks ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install all project dependencies (npm + pip)"
run = [
  "npm install",
  "python -m pip install -r requirements.txt",
]

[tasks.serialise]
description = "Serialise RDF vocabulary and examples → Turtle + JSON-LD"
run = "python src/scripts/serialise.py"

[tasks.build-spec]
description = "Copy assets and build ReSpec HTML spec → dist/index.html"
run = [
  "python src/scripts/copy-assets.py",
  "python src/scripts/build-spec.py",
]

[tasks.build]
description = "Full build: serialise RDF then build ReSpec spec"
depends = ["serialise", "build-spec"]

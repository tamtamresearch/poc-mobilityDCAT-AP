[tools]
node = "24"
uv   = "latest"

# Makes node_modules/.bin available without a global install
[env]
_.path = ["{{cwd}}/node_modules/.bin"]

# ── Tasks ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install all project dependencies (npm + uv sync)"
run = [
  "npm install",
  "uv sync",
]

[tasks.clean]
description = "Empty dist/ before a fresh build"
run = "uv run python src/scripts/clean.py"

[tasks.serialise]
description = "Serialise RDF vocabulary and examples -> Turtle + JSON-LD"
depends = ["clean"]
run = "uv run python src/scripts/serialise.py"

[tasks.build-spec]
description = "Copy assets and build ReSpec HTML spec -> dist/index.html"
depends = ["clean"]
run = [
  "uv run python src/scripts/copy-assets.py",
  "uv run python src/scripts/build-spec.py",
]

[tasks.build]
description = "Full build: clean dist/, serialise RDF, build ReSpec spec"
depends = ["serialise", "build-spec"]

[tasks.lint]
description = "Build spec and list all broken local references"
depends = ["build"]
run = "uv run python src/scripts/check-refs.py"

[tasks.serve]
description = "Serve repo over HTTP for live ReSpec preview with interactive warnings"
run = "uv run python src/scripts/serve.py"

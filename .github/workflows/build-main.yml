name: Build and publish — main (drafts/latest)

# Triggered on every push to main (= the living draft) or manually.
# Publishes to gh-pages under drafts/latest/.

on:
  push:
    branches: [main]
    paths:                      # only run when these change
      - 'src/**'                # source files
      - 'package.json'          # Node (npm) packages
      - 'pyproject.toml'        # Python packages
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages
    env:
      # Use the runner's pre-installed Chrome instead of Puppeteer's bundled
      # Chromium — skips the download and speeds up npm install.
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: |
          npm install
          uv sync

      - name: Add node_modules/.bin to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Serialise RDF
        run: uv run python src/scripts/serialise.py

      - name: Copy assets
        run: uv run python src/scripts/copy-assets.py

      - name: Build ReSpec spec
        run: uv run python src/scripts/build-spec.py

      - name: Validate HTML markup
        run: html-validate dist/index.html
        continue-on-error: true

      - name: Checkout gh-pages for pre-clean
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Clear drafts/latest on gh-pages
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf drafts/latest
          git add -A
          git commit -m "chore: clear drafts/latest before rebuild" || echo "Nothing to clear"
          git push

      - name: Deploy to gh-pages — drafts/latest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: drafts/latest
          keep_files: true

      - name: Upload built spec as artefact
        uses: actions/upload-artifact@v4
        with:
          name: main-spec-built
          path: dist/

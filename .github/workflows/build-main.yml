name: Build and publish — main (drafts/latest)

# Triggered on every push to main (= the living draft) or manually.
# Publishes to gh-pages under drafts/latest/.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # BUILD — placeholder until the build system is wired up.
      #
      # Replace this entire step with the real build once ready:
      #
      #   - name: Setup PHP
      #     uses: shivammathur/setup-php@v2
      #     with:
      #       php-version: '8.2'
      #
      #   - name: Install rdflib (for serialise-vocabulary.sh / serialise-examples.sh)
      #     run: pip install rdflib
      #
      #   - name: Build
      #     run: bash src/scripts/run-all.sh
      #
      # The real build produces these additional outputs (not present yet):
      #   dist/mobilitydcat-ap.ttl
      #   dist/mobilitydcat-ap.jsonld
      #   dist/tables/class-*.html
      #   dist/tables/quick-reference-*.html
      #   dist/tables/mobilitydcat-ap-classes-and-properties.html
      #   dist/tables/deprecated-classes-and-properties.html
      #   dist/examples/*.ttl  dist/examples/*.jsonld
      #   dist/examples/README.md
      # -----------------------------------------------------------------------
      - name: Copy source files to dist  # placeholder build
        run: |
          mkdir -p dist/tables dist/examples dist/figures dist/js

          # Spec entry point and ReSpec config
          cp src/index.html dist/
          cp src/config.js  dist/

          # Ontology source (RDF/XML)
          cp src/mobilitydcat-ap.rdf dist/ 2>/dev/null || true

          # Hand-authored tables — inputs to the build scripts
          cp src/tables/mandatory-classes.html            dist/tables/ 2>/dev/null || true
          cp src/tables/recommended-classes.html          dist/tables/ 2>/dev/null || true
          cp src/tables/optional-classes.html             dist/tables/ 2>/dev/null || true
          cp src/tables/deprecated-classes.html           dist/tables/ 2>/dev/null || true
          cp src/tables/mandatory-properties-for-*.html   dist/tables/ 2>/dev/null || true
          cp src/tables/recommended-properties-for-*.html dist/tables/ 2>/dev/null || true
          cp src/tables/optional-properties-for-*.html    dist/tables/ 2>/dev/null || true
          cp src/tables/deprecated-properties-for-*.html  dist/tables/ 2>/dev/null || true

          # Example source files (serialised variants generated by build)
          cp src/examples/*.rdf dist/examples/ 2>/dev/null || true

          # Static assets
          cp -r src/figures/. dist/figures/ 2>/dev/null || true
          cp -r src/js/.      dist/js/      2>/dev/null || true

      - name: Checkout gh-pages for pre-clean
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Clear drafts/latest on gh-pages
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf drafts/latest
          git add -A
          git commit -m "chore: clear drafts/latest before rebuild" || echo "Nothing to clear"
          git push

      - name: Deploy to gh-pages — drafts/latest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: drafts/latest
          keep_files: true

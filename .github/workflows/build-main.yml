name: Build and publish — main (drafts/latest)

# Triggered on every push to main (= the living draft) or manually.
# Publishes to gh-pages under drafts/latest/.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate ontology serializations
        run: |
          pip install rdflib
          (cd src/scripts && bash serialise-vocabulary.sh)

      - name: Copy source files to dist
        run: |
          mkdir -p dist/tables dist/examples dist/figures dist/js dist/shaclShapes

          # ReSpec config
          cp src/config.js  dist/

          # Ontology source
          cp src/mobilitydcat-ap.rdf    dist/ 2>/dev/null || true
          cp src/mobilitydcat-ap.ttl    dist/ 2>/dev/null || true
          cp src/mobilitydcat-ap.jsonld dist/ 2>/dev/null || true

          # Hand-authored tables — inputs to the build scripts
          cp src/tables/*.html dist/tables/ 2>/dev/null || true

          # Example source files
          cp src/examples/*.rdf dist/examples/ 2>/dev/null || true
          cp src/examples/*.ttl dist/examples/ 2>/dev/null || true

          # Static assets
          cp -r src/figures/.    dist/figures/    2>/dev/null || true
          cp -r src/js/.         dist/js/         2>/dev/null || true
          cp -r src/shaclShapes/. dist/shaclShapes/ 2>/dev/null || true

      - name: Build spec with ReSpec
        uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: respec
          SOURCE: src/index.html
          DESTINATION: dist/index.html
          # TODO: Temporarily disable validation - we MUST enable validation for release!
#          VALIDATE_INPUT_MARKUP: false
          VALIDATE_MARKUP: true
          VALIDATE_LINKS: true

      - name: Copy built index.html into dist
        # spec-prod writes its output to a sibling directory (<repo>.common/dist/),
        # not to the workspace dist/. Copy it back so peaceiris picks up a complete dist/.
        run: cp "${GITHUB_WORKSPACE}.common/dist/index.html" dist/index.html

      - name: Checkout gh-pages for pre-clean
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Clear drafts/latest on gh-pages
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf drafts/latest
          git add -A
          git commit -m "chore: clear drafts/latest before rebuild" || echo "Nothing to clear"
          git push

      - name: Deploy to gh-pages — drafts/latest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: drafts/latest
          keep_files: true

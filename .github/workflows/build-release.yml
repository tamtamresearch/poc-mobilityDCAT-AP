name: Build and publish — release/* (releases/vX.Y.Z)

# Triggered on push to any release/* branch or manually.
# Branch name convention: release/1.0.0
#
# Publishes to gh-pages under:
#   releases/1.0.0/   — the versioned copy
#   releases/latest/  — always points to the newest release
#
# Also creates a GitHub Release with the built docs as a zip artefact.

on:
  push:
    branches: ['release/*']
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages and softprops/action-gh-release

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version from branch name
        # release/1.0.0 → VERSION=1.0.0
        run: echo "VERSION=${GITHUB_REF_NAME#release/}" >> $GITHUB_ENV

      - name: Generate ontology serializations
        run: |
          pip install rdflib
          (cd src/scripts && bash serialise-vocabulary.sh)

      - name: Copy source files to dist
        run: |
          mkdir -p dist/tables dist/examples dist/figures dist/js dist/shaclShapes

          cp src/config.js  dist/

          cp src/mobilitydcat-ap.rdf    dist/ 2>/dev/null || true
          cp src/mobilitydcat-ap.ttl    dist/ 2>/dev/null || true
          cp src/mobilitydcat-ap.jsonld dist/ 2>/dev/null || true

          cp src/tables/*.html dist/tables/ 2>/dev/null || true

          cp src/examples/*.rdf dist/examples/ 2>/dev/null || true
          cp src/examples/*.ttl dist/examples/ 2>/dev/null || true

          cp -r src/figures/.    dist/figures/    2>/dev/null || true
          cp -r src/js/.         dist/js/         2>/dev/null || true
          cp -r src/shaclShapes/. dist/shaclShapes/ 2>/dev/null || true

      - name: Build spec with ReSpec
        uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: respec
          SOURCE: src/index.html
          DESTINATION: dist/index.html

      - name: Checkout gh-pages for pre-clean
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Clear releases/${{ env.VERSION }} and releases/latest on gh-pages
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf releases/${{ env.VERSION }} releases/latest
          git add -A
          git commit -m "chore: clear releases/${{ env.VERSION }} and releases/latest before rebuild" || echo "Nothing to clear"
          git push

      - name: Deploy to gh-pages — releases/${{ env.VERSION }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: releases/${{ env.VERSION }}
          keep_files: true

      - name: Deploy to gh-pages — releases/latest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: releases/latest
          keep_files: true

      - name: Package built docs
        run: zip -r docs-${{ env.VERSION }}.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: mobilityDCAT-AP ${{ env.VERSION }}
          files: docs-${{ env.VERSION }}.zip

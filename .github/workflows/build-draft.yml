name: Build and publish — draft/* tag (drafts/vX.Y.Z)

# Triggered on push of any draft/* tag or manually.
# Tag name convention: draft/1.0.0-draft-0.1
#
# Publishes to gh-pages under:
#   drafts/1.0.0-draft-0.1/
#
# Also creates a GitHub pre-release with the built docs as a zip artefact.
#
# Note: drafts/latest/ is managed by build-main.yml (push to main).
# This workflow handles named, point-in-time draft snapshots.

on:
  push:
    tags: ['draft/*']
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages and softprops/action-gh-release

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version from tag name
        # draft/1.0.0-draft-0.1 → VERSION=1.0.0-draft-0.1
        run: echo "VERSION=${GITHUB_REF_NAME#draft/}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # BUILD — placeholder. See build-main.yml for the full replacement block.
      # -----------------------------------------------------------------------
      - name: Copy source files to dist  # placeholder build
        run: |
          mkdir -p dist/tables dist/examples dist/figures dist/js

          cp src/index.html dist/
          cp src/config.js  dist/

          cp src/mobilitydcat-ap.rdf dist/ 2>/dev/null || true

          cp src/tables/mandatory-classes.html            dist/tables/ 2>/dev/null || true
          cp src/tables/recommended-classes.html          dist/tables/ 2>/dev/null || true
          cp src/tables/optional-classes.html             dist/tables/ 2>/dev/null || true
          cp src/tables/deprecated-classes.html           dist/tables/ 2>/dev/null || true
          cp src/tables/mandatory-properties-for-*.html   dist/tables/ 2>/dev/null || true
          cp src/tables/recommended-properties-for-*.html dist/tables/ 2>/dev/null || true
          cp src/tables/optional-properties-for-*.html    dist/tables/ 2>/dev/null || true
          cp src/tables/deprecated-properties-for-*.html  dist/tables/ 2>/dev/null || true

          cp src/examples/*.rdf dist/examples/ 2>/dev/null || true

          cp -r src/figures/. dist/figures/ 2>/dev/null || true
          cp -r src/js/.      dist/js/      2>/dev/null || true

      - name: Checkout gh-pages for pre-clean
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Clear drafts/${{ env.VERSION }} on gh-pages
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf drafts/${{ env.VERSION }}
          git add -A
          git commit -m "chore: clear drafts/${{ env.VERSION }} before rebuild" || echo "Nothing to clear"
          git push

      - name: Deploy to gh-pages — drafts/${{ env.VERSION }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: drafts/${{ env.VERSION }}
          keep_files: true

      - name: Package built docs
        run: zip -r docs-${{ env.VERSION }}.zip dist/

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mobilityDCAT-AP ${{ env.VERSION }}
          prerelease: true
          files: docs-${{ env.VERSION }}.zip

name: Build and publish — draft/* tag (drafts/vX.Y.Z)

# Triggered on push of any draft/* tag or manually.
# Tag name convention: draft/1.0.0-draft-0.1
#
# Publishes to gh-pages under:
#   drafts/1.0.0-draft-0.1/
#
# Note: drafts/latest/ is managed by build-main.yml (push to main).
# This workflow handles named, point-in-time draft snapshots.

on:
  push:
    tags: ['draft/*']
  workflow_dispatch:

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract and validate version from tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#draft/}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: '$VERSION' is not a valid version number."
            echo "This workflow must be triggered from a draft/* tag, not from a branch."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: extract-version
    uses: ./.github/workflows/reusable-build.yml

  publish:
    needs: [extract-version, build]
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-publish-gh-pages.yml
    with:
      artifact_name: ${{ needs.build.outputs.artifact_name }}
      destination_dir: drafts/${{ needs.extract-version.outputs.version }}

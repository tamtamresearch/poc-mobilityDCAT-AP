name: Reusable — deploy to gh-pages

on:
  workflow_call:
    inputs:
      artifact_name:
        description: 'Name of the dist artifact to deploy (use needs.build.outputs.artifact_name)'
        type: string
        required: true
      destination_dir:
        description: 'Target directory on gh-pages (e.g. drafts/latest, releases/1.0.0)'
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: dist

      - name: Checkout gh-pages for pre-clean
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Clear ${{ inputs.destination_dir }} on gh-pages
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf "${{ inputs.destination_dir }}"
          git add -A
          git commit -m "chore: clear ${{ inputs.destination_dir }} before rebuild" || echo "Nothing to clear"
          git push

      - name: Deploy to gh-pages — ${{ inputs.destination_dir }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: ${{ inputs.destination_dir }}
          keep_files: true

name: Reusable — publish to gh-pages

on:
  workflow_call:
    inputs:
      artifact_name:
        description: 'Name of the dist artifact to publish (use needs.build.outputs.artifact_name)'
        type: string
        required: true
      destination_dir:
        description: 'Target directory on gh-pages (e.g. drafts/latest, releases/1.0.0)'
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: dist

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Publish ${{ inputs.destination_dir }}
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf "${{ inputs.destination_dir }}"
          mkdir -p "${{ inputs.destination_dir }}"
          cp -r ../dist/. "${{ inputs.destination_dir }}/"
          git add -A
          git commit -m "chore: publish ${{ inputs.destination_dir }}" || echo "Nothing to publish"
          git push

name: Promote release to releases/latest

# Promotes a previously published release to releases/latest/.
# Does two things:
#   1. Updates LATEST_RELEASE on main — so future hotfixes to this release
#      branch will automatically update releases/latest/.
#   2. Copies the already-built releases/X.Y.Z/ to releases/latest/ on gh-pages
#      immediately, without waiting for a re-build.
#
# Usage: Actions → "Promote release to releases/latest" → Run workflow → enter version (e.g. 1.0.0)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Update LATEST_RELEASE on main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Write version and push to main
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          echo "${{ inputs.version }}" > LATEST_RELEASE
          git add LATEST_RELEASE
          git commit -m "chore: mark ${{ inputs.version }} as latest release"
          git push

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Copy releases/${{ inputs.version }} to releases/latest
        working-directory: gh-pages-out
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          if [ ! -d "releases/${{ inputs.version }}" ]; then
            echo "ERROR: releases/${{ inputs.version }} does not exist on gh-pages." >&2
            exit 1
          fi

          rm -rf releases/latest
          cp -r "releases/${{ inputs.version }}/." releases/latest/
          git add -A
          git commit -m "chore: promote releases/${{ inputs.version }} to releases/latest"
          git push
